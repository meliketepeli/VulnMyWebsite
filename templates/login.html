
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #007bff, #555555);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .login-container {
            background-color: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container h1 {
            margin-bottom: 1.5rem;
            color: #007bff;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .login-form label {
            text-align: left;
            font-weight: bold;
            color: #555;
        }

        .login-form input {
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .login-form input:focus {
            border-color: #007bff;
            outline: none;
        }

        .login-form button {
            background-color: #007bff;
            color: #fff;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .login-form button:hover {
            background-color: #0056b3;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 1.5rem;
            }

            .login-form input,
            .login-form button {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Login</h1>
        <form id="loginForm" class="login-form">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <br><br>
            <button type="submit">Login</button>
        </form>
    </div>

    <script>
        // Formun submit olayını yakala
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Formun varsayılan davranışını engelle

            // Form verilerini al
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // JSON verisini oluştur
            const loginData = {
                username: username,
                password: password
            };

            // Fetch API ile POST isteği gönder
            fetch('http://0.0.0.0:5000/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(loginData)
            })
            .then(response => {
    if (response.redirected) {
        window.location.href = response.url; // Backend'den gelen yönlendirme sayfasına git
    } else {
        return response.json();
    }
})

            .then(data => {
                console.log('Success:', data);
                // Başarılı giriş durumunda yönlendirme yapabilirsin
                if (data.token) {
                    localStorage.setItem('token', data.token); // Token'ı localStorage'a kaydet
                    window.location.href = data.role === 'user' ? '/products' : '/my-products';
                } else {
                    alert(data.error || 'Login failed');
                }
            })
            .catch((error) => {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
            });
        });
    </script>
</body>
</html>
