{{ define "cart" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        h1 {
            padding: 30px;
        }

        nav {
            background-color: #0056b3;
            color: white;
            padding: 25px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-right: 30px;
        }
        .cart-container {
            padding: 3%;
        }
        .cart-card {
            border: 3px solid #ccc;
            padding: 10px;
            margin: 30px;
            display: inline-block;
            width: 75%;
            text-align: center;
        }
    </style>
</head>


<body>

    <nav>
        <a href="/products">Products</a>
        <a href="/carts">Cart</a>
        <a href="/my-orders">My Orders</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>

<script>
    function logout() {
        var form = document.createElement('form');
        form.method = 'POST';
        form.action = '/logout';
        document.body.appendChild(form);
        form.submit();
    }
</script>

<h1>My Cart</h1>

<div class="cart-container">
    {{ if .CartItems }}
    {{ range .CartItems }}
    <div class="cart-card">
        <h3>{{ .Name }}</h3>
        <p>Price: ${{ .Price }}</p>
        <p>Quantity: {{ .Quantity }}</p>
        <p><strong>Total Amount: $<span class="total-amount">{{ .Price }}</span></strong></p>
    </div>
    {{ end }}
    {{ else }}
    <p>No products found in this cart.</p>
    {{ end }}
</div>

<script>
    window.onload = function() {
        let cartItems = document.querySelectorAll(".cart-card");

        cartItems.forEach(function(cartItem) {
            let price = parseFloat(cartItem.querySelector("p:nth-child(2)").textContent.replace("Price: $", ""));
            let quantity = parseInt(cartItem.querySelector("p:nth-child(3)").textContent.replace("Quantity: ", ""));
            let totalAmount = price * quantity;
            cartItem.querySelector(".total-amount").textContent = totalAmount.toFixed(2);
        });
    };
</script>

</body>
</html>
{{ end }}
